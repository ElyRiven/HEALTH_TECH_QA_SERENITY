webdriver {
    driver = chrome
}

# --- Modo de ejecución ---
headless.mode = true

# --- Timeouts ---
webdriver.timeouts.implicitlywait = 10000
webdriver.wait.for.timeout = 10000

# --- Capturas de pantalla ---
serenity.take.screenshots = AFTER_EACH_STEP

# --- Reporte ---
serenity.report.encoding = UTF-8
serenity.compress.filenames = false
serenity.verbose.steps = true

# --- Chrome Switches optimizados para Pipeline ---
chrome.switches = """--no-sandbox;--headless=new;--disable-gpu;--disable-dev-shm-usage;\
                     --disable-extensions;--disable-infobars;--disable-popup-blocking;\
                     --disable-default-apps;--ignore-certificate-errors;\
                     --test-type;--window-size=1920,1080"""

